name: Deploy to GitHub Pages with Auto-Update

on:
  push:
    branches: [ main ]
  schedule:
    # 毎日午前9時(UTC) = 日本時間18時に自動実行
    - cron: '0 9 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          cd scripts
          npm install
        continue-on-error: true
          
      - name: Fetch latest Taiwan news
        run: |
          node scripts/fetch-taiwan-news.js
        continue-on-error: true
        
      - name: Create archive
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p archive
          cp index.html "archive/${DATE}.html"
          
      - name: Build archive index
        run: |
          node scripts/build-archive.js
        continue-on-error: true
          
      - name: Generate Note draft
        run: |
          node scripts/post-to-note.js
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
        continue-on-error: true
          
      - name: Upload Note draft
        uses: actions/upload-artifact@v4
        with:
          name: NOTE-DRAFT
          path: note-draft.txt
        continue-on-error: true
          
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add archive/ news-update.log
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: $(date +%Y-%m-%d)"
        continue-on-error: true
        
      - name: Push changes
        run: git push
        continue-on-error: true
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
