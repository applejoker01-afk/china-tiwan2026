<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウクライナ戦争レポート - アーカイブ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 60px 40px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #005BBB;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 4px solid #FFD500;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: #005BBB;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }
        
        .archive-list {
            list-style: none;
        }
        
        .archive-item {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .archive-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .archive-link {
            color: #005BBB;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .archive-link:hover {
            text-decoration: underline;
        }
        
        .archive-date {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .no-archives {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 最新レポートに戻る</a>
        
        <h1>📚 アーカイブ - 過去のレポート</h1>
        
        <p style="margin-bottom: 30px;">過去に公開されたウクライナ戦争レポートのアーカイブです。日付をクリックすると、その日のレポートを閲覧できます。</p>
        <ul class="archive-list">
            <li class="archive-item">
                <a href="2026-04-22.html" class="archive-link">2026年04月22日版</a>
